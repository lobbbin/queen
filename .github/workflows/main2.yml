name: Build Android APK from ZIP

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Find and Extract ZIP File
      run: |
        ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -n 1)
        if [ -z "$ZIP_FILE" ]; then
          echo "❌ Error: No .zip file found in the root directory!"
          exit 1
        fi
        
        echo "📦 Found ZIP: $ZIP_FILE. Extracting..."
        mkdir staging_dir
        unzip -q "$ZIP_FILE" -d staging_dir
        
        GRADLE_PATH=$(find staging_dir -name "build.gradle" -o -name "build.gradle.kts" | head -n 1)
        if [ -z "$GRADLE_PATH" ]; then
          echo "❌ Error: No build.gradle or build.gradle.kts found inside the ZIP!"
          exit 1
        fi
        
        PROJECT_ROOT=$(dirname "$GRADLE_PATH")
        echo "🎯 Project root detected at: $PROJECT_ROOT"
        
        cp -r "$PROJECT_ROOT"/. .
        rm -rf staging_dir
        
        # Ensure a gradle wrapper script exists in the root
        if [ ! -f "./gradlew" ]; then
          echo "⚠️ gradlew wrapper missing in root. Attempting fallback generation..."
          gradle wrapper || true
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Grant Execute Permission for Gradlew
      run: chmod +x ./gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: |
          **/build/outputs/apk/debug/*.apk
          **/build/outputs/apk/*/*.apk
