name: Unzip App Source Code

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Extract Archive Contents
      run: |
        mkdir -p temp_extract
        unzip -q "*.zip" -d temp_extract
        
        GRADLE_PATH=$(find temp_extract -name "build.gradle" -o -name "build.gradle.kts" | head -n 1)
        PROJECT_ROOT=$(dirname "$GRADLE_PATH")
        
        cp -r "$PROJECT_ROOT"/. .
        rm -rf temp_extract README.md *.zip

    - name: Commit Extracted Project Files
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        git add .
        git commit -m "Automated extraction of project source files" || exit 0
        git push origin HEAD:${{ github.ref_name }}
