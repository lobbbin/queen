name: Deploy Artifact to Main

on:
  workflow_dispatch: # Allows you to trigger this instantly by clicking "Run workflow" on GitHub

permissions:
  contents: write
  workflows: write

jobs:
  deploy_artifact:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Download Extracted Artifact
      uses: actions/download-artifact@v4
      with:
        name: clean-extracted-project
        path: ./

    - name: Commit and Push Clean Source Files
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        
        # Remove any lingering trigger or archive files if desired
        rm -f source.zip
        
        git add .
        git commit -m "Deploy clean unzipped files from artifact sha256:7b2ea377" || exit 0
        git push origin HEAD:main
