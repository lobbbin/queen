name: Unzip and Commit Artifact

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  extract_and_commit:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        # Uses your custom token to bypass workflow file protection locks
        token: ${{ secrets.MY_PUSH_TOKEN }}

    - name: Extract Project Files
      run: |
        echo "📦 Extracting source archive..."
        mkdir -p temp_extract
        unzip -q source.zip -d temp_extract
        
        GRADLE_PATH=$(find temp_extract -name "build.gradle" -o -name "build.gradle.kts" | head -n 1)
        if [ -z "$GRADLE_PATH" ]; then
          echo "❌ ERROR: No build.gradle file found!"
          exit 1
        fi
        
        PROJECT_ROOT=$(dirname "$GRADLE_PATH")
        cp -r "$PROJECT_ROOT"/. .
        rm -rf temp_extract README.md source.zip

    - name: Push Clean Files back to Repo
      run: |
        git config --global user.name "lobbbin"
        git config --global user.email "lobbbin@://github.com"
        git add .
        git commit -m "Automated extraction of project files into repository" || exit 0
        git push origin HEAD:${{ github.ref_name }}
