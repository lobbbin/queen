name: Unzip App Source Code

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Unzip Source Files
      run: |
        ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -n 1)
        if [ -z "$ZIP_FILE" ]; then
          echo "ERROR: No ZIP file found in root directory"
          exit 1
        fi
        
        echo "Extracting project file..."
        mkdir -p temp_extract
        unzip -q "$ZIP_FILE" -d temp_extract
        
        GRADLE_PATH=$(find temp_extract -name "build.gradle" -o -name "build.gradle.kts" | head -n 1)
        if [ -z "$GRADLE_PATH" ]; then
          echo "ERROR: No build.gradle file found inside ZIP"
          exit 1
        fi
        
        PROJECT_ROOT=$(dirname "$GRADLE_PATH")
        
        cp -r "$PROJECT_ROOT"/. .
        rm -rf temp_extract README.md "$ZIP_FILE"

    - name: Commit and Push Extracted Files
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        git add .
        git commit -m "Automated extraction of project source files" || exit 0
        git push origin HEAD:${{ github.ref_name }}
