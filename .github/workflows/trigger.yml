name: Unzip App Source Code

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

# THIS BLOCK GRANTS PERMISSION TO PUSH THE INTERNAL WORKFLOW FILES
permissions:
  contents: write
  workflows: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Extract Project Files
      run: |
        echo "📦 Extracting target archive: source.zip"
        mkdir -p temp_extract
        unzip -q source.zip -d temp_extract
        
        echo "🔍 Locating Android project root..."
        GRADLE_PATH=$(find temp_extract -name "build.gradle" -o -name "build.gradle.kts" | head -n 1)
        
        if [ -z "$GRADLE_PATH" ]; then
          echo "❌ ERROR: No build.gradle file found inside source.zip!"
          exit 1
        fi
        
        PROJECT_ROOT=$(dirname "$GRADLE_PATH")
        echo "🎯 Project directory located: $PROJECT_ROOT"
        
        echo "🚚 Pushing files into root layout..."
        cp -r "$PROJECT_ROOT"/. .
        
        echo "🧹 Cleaning temporary archive artifacts..."
        rm -rf temp_extract README.md source.zip

    - name: Commit Extracted Project Files
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        git add .
        git commit -m "Automated extraction of project source files" || exit 0
        git push origin HEAD:${{ github.ref_name }}
