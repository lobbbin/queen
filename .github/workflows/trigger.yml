name: Unzip App Source Code

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Verify and Extract Archive Contents
      run: |
        echo "=== Checking Workspace Files ==="
        ls -la
        
        # Count ZIP files safely
        ZIP_COUNT=$(ls -1 *.zip 2>/dev/null | wc -l)
        if [ "$ZIP_COUNT" -eq 0 ]; then
          echo "❌ ERROR: No .zip file exists in the repository root directory."
          echo "Please ensure your compressed application file is uploaded directly to the root folder."
          exit 1
        fi

        echo "📦 Found matching zip target. Initializing extraction..."
        mkdir -p temp_extract
        
        # Extract files safely using loop iteration to avoid wildcard expansion crash
        for file in *.zip; do
          unzip -q "$file" -d temp_extract
          break
        done
        
        echo "🔍 Scanning extracted contents for Gradle properties..."
        GRADLE_PATH=$(find temp_extract -name "build.gradle" -o -name "build.gradle.kts" | head -n 1)
        if [ -z "$GRADLE_PATH" ]; then
          echo "❌ ERROR: Could not find build.gradle or build.gradle.kts inside your ZIP package."
          exit 1
        fi
        
        PROJECT_ROOT=$(dirname "$GRADLE_PATH")
        echo "🎯 Target project root discovered at: $PROJECT_ROOT"
        
        echo "🚚 Relocating project files to primary repository workspace..."
        cp -r "$PROJECT_ROOT"/. .
        rm -rf temp_extract README.md *.zip

    - name: Commit Extracted Project Files
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        git add .
        git commit -m "Automated extraction of project source files" || exit 0
        git push origin HEAD:${{ github.ref_name }}
