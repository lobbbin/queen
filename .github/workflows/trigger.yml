name: Unzip App Source Code

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Extract Project Files
      run: |
        echo "📦 Extracting target archive: source.zip"
        mkdir -p temp_extract
        unzip -q source.zip -d temp_extract
        
        echo "🔍 Locating Android project root..."
        GRADLE_PATH=$(find temp_extract -name "build.gradle" -o -name "build.gradle.kts" | head -n 1)
        
        if [ -z "$GRADLE_PATH" ]; then
          echo "❌ ERROR: No build.gradle file found inside source.zip!"
          exit 1
        fi
        
        PROJECT_ROOT=$(dirname "$GRADLE_PATH")
        echo "🎯 Project directory located: $PROJECT_ROOT"
        
        echo "🚚 Moving files to workspace root..."
        cp -r "$PROJECT_ROOT"/. .
        
        echo "🧹 Cleaning up zip files from package..."
        rm -rf temp_extract README.md source.zip

    - name: Upload Clean Extracted Project
      uses: actions/upload-artifact@v4
      with:
        name: clean-extracted-project
        path: ./*
