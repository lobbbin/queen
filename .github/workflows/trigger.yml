name: Deploy Clean Artifact to Main

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Download Extracted Artifact
      uses: actions/download-artifact@v4
      with:
        name: clean-extracted-project
        path: ./

    - name: Clean Up Workspace
      run: |
        rm -f source.zip unzip.zip README.md
        ls -la

    - name: Create Clean Pull Request
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        branch: deploy-clean-app
        title: "Deploy clean unzipped files from artifact"
        body: "Extracting application source files onto the main tracking branch."
        commit-message: "Deploy clean unzipped files from artifact sha256:7b2ea377"
